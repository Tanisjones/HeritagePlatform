ai:
  # Global on/off switch for all AI endpoints.
  enabled: true

  # Provider selection. Supported: "ollama" (local, dev-only) or "gemini"
  # (Google's hosted API — recommended for production).
  #
  # To use Gemini instead of Ollama:
  #   1. set `provider: gemini`
  #   2. set `model:` to a Gemini model (e.g. gemini-2.0-flash)
  #   3. put the key in the env var named by `api_key_env` (GEMINI_API_KEY)
  #      in .env / .env.prod — NEVER in this committed file.
  provider: ollama

  # Ollama only: base URL of the daemon. For docker-compose this resolves to the
  # service name on the internal network. Ignored by the Gemini provider.
  base_url: http://ollama:11434

  # Model id. Ollama: a small CPU-friendly model. Gemini: e.g. gemini-2.0-flash.
  model: llama3.2:1b

  # Name of the environment variable holding the provider API key (hosted
  # providers only). The key VALUE lives in .env/.env.prod, never here.
  api_key_env: GEMINI_API_KEY

  # When true, creating a contribution fires a synchronous AI call to generate
  # reviewable suggestions (shown in the curator "AI Suggestions" page). OFF by
  # default so contribution submission stays instant and never blocks on a
  # provider round-trip — enable only with a fast, reliable provider.
  auto_suggest_on_create: false

  request_timeout_seconds: 30
  temperature: 0.2
  max_output_tokens: 700

  # Per-model price table for the AI-economy dashboard: USD per 1,000,000 tokens.
  # Look-up is by model id, falling back to the "*" entry. Local/Ollama models
  # cost nothing, so the "*" fallback of 0 covers them. Update these when a
  # provider changes prices or you add a model — no code change needed.
  pricing:
    "gemini-2.0-flash": { input: 0.075, output: 0.30 }
    "gemini-1.5-flash": { input: 0.075, output: 0.30 }
    "gemini-1.5-pro": { input: 1.25, output: 5.00 }
    "*": { input: 0.0, output: 0.0 }   # fallback — Ollama / local models

  # Optional spend/usage caps for the current calendar month (G.6). Any field set
  # to null (or omitted) disables that particular cap. Enforcement sums the
  # month's AIUsageRecord rows (cached ~60s) and blocks with HTTP 429 BEFORE the
  # provider is called. With Ollama (cost 0) the USD caps never trigger; set token
  # caps to bound local usage too. All caps default to null (unlimited) so this is
  # inert until you opt in.
  budget:
    monthly_usd_per_user: null      # e.g. 5.0  → each user max $5/month
    monthly_usd_global: null        # e.g. 100.0 → whole platform max $100/month
    monthly_tokens_per_user: null   # e.g. 2000000
    monthly_tokens_global: null     # e.g. 50000000

  # Explicit allow-list of operations the UI can invoke.
  allowed_operations:
    - contribution_draft
    - contribution_metadata
    - curator_review_assist
    - educational_metadata
    - route_metadata
    - translate
    - lesson_plan_draft

  # Prompt templates are stored here so they can evolve without code changes.
  prompts:
    contribution_draft: |
      You are helping a user draft a cultural heritage contribution.
      Return JSON with fields: title, description.
      Language: {{language}}.

    contribution_metadata: |
      Suggest structured metadata. Return JSON with fields:
      historical_period, keywords (array of strings), external_registry_url (optional).
      Language: {{language}}.

    curator_review_assist: |
      You are helping a curator review a pending heritage contribution.
      Return JSON with fields:
      missing_fields (array), risk_flags (array), curator_feedback_draft (string), suggested_edits (object).
      Language: {{language}}.

    educational_metadata: |
      You are an instructional designer adding an educational (IEEE-LOM) layer
      to a cultural heritage resource. From the resource title, description and
      type, infer pedagogical metadata. Return JSON with fields:
      learning_resource_type (one of: image, audio, video, document, exercise,
      simulation, questionnaire, diagram, figure, graph, slide, table,
      narrative_text, exam, experiment, problem_statement, self_assessment,
      lecture),
      difficulty (one of: very_easy, easy, medium, difficult, very_difficult),
      typical_age_range (string, e.g. "12-14" or "18+"),
      typical_learning_time (ISO-8601 duration, e.g. "PT30M"),
      context (one of: school, higher_education, training, other),
      learning_objectives (array of short strings),
      keywords (array of strings).
      Use null when a value cannot be inferred. Language: {{language}}.

    route_metadata: |
      You are helping design a cultural heritage walking route in Riobamba,
      Ecuador. From the route title and its ordered list of stops (each a heritage
      site with a title and description), propose route metadata. Return JSON with
      fields:
      description (a short, inviting paragraph summarizing the route),
      theme (a concise theme, e.g. "religious heritage", "colonial architecture"),
      difficulty (one of: easy, medium, hard),
      estimated_duration (ISO-8601 duration for a walking visit, e.g. "PT2H").
      Use null when a value cannot be inferred. Language: {{language}}.

    translate: |
      You are a professional translator for a cultural heritage platform.
      Translate the provided fields from {{source_lang}} to {{target_lang}},
      preserving proper nouns and place names. Return JSON with the SAME field
      names you received under "fields": title, description, keywords (array).
      Translate only; do not add commentary.

    lesson_plan_draft: |
      You are an instructional designer creating a structured lesson plan that uses
      the cultural heritage of Riobamba, Ecuador, as its subject matter. Given the
      lesson title "{{title}}", subject "{{subject}}", grade level "{{grade_level}}"
      and audience "{{audience}}", propose a coherent DRAFT for a teacher to review
      and edit. Return JSON with exactly these fields:
      objectives: array of 2-5 concise, measurable learning objectives (strings).
      activities: an ORDERED array of 4-6 activities that build on each other. Each
        activity is an object with:
          title (short string),
          activity_type (EXACTLY one of: hook, explore, explain, practice, assess,
            reflect — follow a sensible pedagogical arc, e.g. start with hook,
            include at least one assess),
          instructions (a short paragraph of classroom instructions; plain text or
            simple HTML),
          duration_minutes (integer),
          suggested_heritage_item_hint (optional string naming a heritage site or
            route that would fit — a HINT only, never an id; omit or null if none).
      Do NOT invent database ids. Return ONLY the JSON object. Language: {{language}}.
